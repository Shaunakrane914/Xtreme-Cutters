<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #d5e527, #D8BFD8);
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 400px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }




        .gender-options label {
            font-weight: normal;
        }

        .location {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .location input {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #949d2b;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            margin-top: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #c74151;
        }
    </style>
</head>

<body>
    <div class="container">
        <form class="registration-form" id="registrationForm">
            <h2>Registration Form</h2>

            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" placeholder="Enter full name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter email address" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter phone number" required>

            <label for="birthdate">Birth Date</label>
            <input type="date" id="birthdate" required>

            <label for="address">Address</label>
            <input type="text" id="address" placeholder="Enter street address" required>
            <input type="text" id="address2" placeholder="Enter street address line 2">

            <label for="country">Country</label>
            <select id="country">
                <option>Select Country</option>
                <option>India</option>
                <option>USA</option>
                <option>UK</option>
                <option>Canada</option>
            </select>

            <div class="location">
                <input type="text" id="city" placeholder="Enter your city" required>
                <input type="text" id="region" placeholder="Enter your region" required>
                <input type="text" id="postal" placeholder="Enter postal code" required>
            </div>

            <button type="button" onclick="submitForm()">Submit</button>
        </form>
    </div>

    <script>
        function submitForm() {
            var fullname = document.getElementById("fullname").value;
            var email = document.getElementById("email").value;
            var phone = document.getElementById("phone").value;
            var birthdate = document.getElementById("birthdate").value;
            var address = document.getElementById("address").value;
            var address2 = document.getElementById("address2").value;
            var country = document.getElementById("country").value;
            var city = document.getElementById("city").value;
            var region = document.getElementById("region").value;
            var postal = document.getElementById("postal").value;

            var userData = {
                fullname: fullname,
                email: email,
                phone: phone,
                birthdate: birthdate,
                address: address,
                address2: address2,
                country: country,
                city: city,
                region: region,
                postal: postal
            };
            localStorage.setItem("userData", JSON.stringify(userData));
            window.location.href = "display.html";
        }
    </script>
</body>

</html>
